name: release

on:
  push:
    tags:
      - 'v*'           # e.g. v0.1.0, v0.2.0-rc1
  workflow_dispatch:   # let you run it manually from the Actions tab

permissions:
  contents: write      # required to create a Release and upload assets

jobs:
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package artifact
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          $stage = "fdiff-$ver-x86_64-windows"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/fdiff.exe $stage/
          Copy-Item README.md $stage/
          Copy-Item LICENSE  $stage/
          Compress-Archive -Path $stage/* -DestinationPath "$stage.zip"
          (Get-FileHash "$stage.zip" -Algorithm SHA256).Hash | Out-File -Encoding ascii "$stage.zip.sha256"
          (Get-FileHash "$stage/fdiff.exe" -Algorithm SHA256).Hash | Out-File -Encoding ascii "$stage/fdiff.exe.sha256"
          Get-ChildItem $stage*

      - name: Upload build artifacts (for non-tag runs)
        if: startsWith(github.ref, 'refs/tags/') == false
        uses: actions/upload-artifact@v4
        with:
          name: fdiff-windows
          path: |
            fdiff-*-x86_64-windows.zip
            fdiff-*-x86_64-windows.zip.sha256

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            fdiff-*-x86_64-windows.zip
            fdiff-*-x86_64-windows.zip.sha256
            fdiff-*-x86_64-windows/fdiff.exe
            fdiff-*-x86_64-windows/fdiff.exe.sha256
